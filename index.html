<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Entrevistamon GBA</title>
<style>
body {
  margin:0;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
canvas {
  image-rendering: pixelated;
  border:4px solid #222;
}
</style>
</head>
<body>

<canvas id="game" width="480" height="320"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const TILE = 16;
const SCALE = 3;

ctx.scale(SCALE, SCALE);

const MAP_W = 30;
const MAP_H = 20;

const colors = {
  floor:"#C8B860",
  floorDark:"#B8A850",
  wall:"#3A4A6A",
  wallDark:"#2A3955",
  carpet:"#7ED060",
  carpetBorder:"#FFFFFF",
  bed:"#6B78D6",
  desk:"#8B5A2B",
  stair:"#9AA9C0"
};

function drawTile(x,y,color){
  ctx.fillStyle=color;
  ctx.fillRect(x*TILE,y*TILE,TILE,TILE);
}

function drawParquet(x,y){
  drawTile(x,y, colors.floor);
  ctx.strokeStyle = colors.floorDark;
  ctx.beginPath();
  ctx.moveTo(x*TILE, y*TILE+TILE);
  ctx.lineTo(x*TILE+TILE, y*TILE);
  ctx.stroke();
}

function drawCarpet(x,y){
  drawTile(x,y, colors.carpet);
  ctx.strokeStyle = colors.carpetBorder;
  ctx.strokeRect(x*TILE+1,y*TILE+1,TILE-2,TILE-2);
  ctx.fillStyle="#5CBF4B";
  ctx.fillRect(x*TILE+6,y*TILE+6,4,4);
}

function drawBed(x,y){
  drawTile(x,y, colors.bed);
  ctx.fillStyle="#D8D8FF";
  ctx.fillRect(x*TILE+4,y*TILE+4,8,6);
}

function drawDesk(x,y){
  drawTile(x,y, colors.desk);
  ctx.fillStyle="#4CB3FF";
  ctx.fillRect(x*TILE+5,y*TILE+3,6,6);
}

function drawStairs(x,y){
  drawTile(x,y, colors.stair);
  ctx.fillStyle="#7F8EA3";
  ctx.fillRect(x*TILE+4,y*TILE+4,8,2);
  ctx.fillRect(x*TILE+4,y*TILE+8,8,2);
}

function drawWall(x,y){
  drawTile(x,y, colors.wall);
  ctx.fillStyle=colors.wallDark;
  ctx.fillRect(x*TILE,y*TILE, TILE, 3);
}

const player = {x:10, y:10};
const selecti = {x:20, y:14};

function drawPlayer(px,py){
  ctx.fillStyle="#FF0000";
  ctx.fillRect(px*TILE+4,py*TILE+4,8,8);
  ctx.fillStyle="#FFF";
  ctx.fillRect(px*TILE+6,py*TILE+6,4,4);
}

function drawNPC(px,py){
  ctx.fillStyle="#00AA55";
  ctx.fillRect(px*TILE+4,py*TILE+4,8,8);
}

function drawMap(){
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      drawParquet(x,y);
    }
  }

  // parets
  for(let x=0;x<MAP_W;x++){
    drawWall(x,0);
    drawWall(x,MAP_H-1);
  }
  for(let y=0;y<MAP_H;y++){
    drawWall(0,y);
    drawWall(MAP_W-1,y);
  }

  // catifa
  drawCarpet(8,8);
  drawCarpet(9,8);
  drawCarpet(8,9);
  drawCarpet(9,9);

  // llit
  drawBed(4,6);
  drawBed(5,6);

  // escriptori
  drawDesk(14,5);

  // escales
  drawStairs(15,10);
  drawStairs(15,11);
}

function gameLoop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawMap();
  drawPlayer(player.x,player.y);
  drawNPC(selecti.x,selecti.y);
  requestAnimationFrame(gameLoop);
}

document.addEventListener("keydown", e=>{
  if(e.key==="ArrowUp") player.y--;
  if(e.key==="ArrowDown") player.y++;
  if(e.key==="ArrowLeft") player.x--;
  if(e.key==="ArrowRight") player.x++;
});

gameLoop();
</script>

</body>
</html>
