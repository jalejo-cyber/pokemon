<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<title>Entrevistamon FireRed</title>
<style>
body{
  margin:0;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}
canvas{
  image-rendering: pixelated;
  border:4px solid #222;
}
</style>
</head>
<body>

<canvas id="game" width="720" height="480"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const BASE_W = 240;
const BASE_H = 160;
const SCALE = 3;

ctx.scale(SCALE,SCALE);

const TILE = 16;

const colors = {
  parquet:"#C8B860",
  parquetDark:"#B7A74F",
  wall:"#3E4E6E",
  wallTop:"#2F3D5A",
  carpet:"#78D060",
  carpetDot:"#58B848",
  bed:"#6C78D8",
  pillow:"#E8E8FF",
  desk:"#8B5A2B",
  pc:"#4CB3FF",
  stair:"#9BA8C0",
  stairDark:"#7F8CA0"
};

function rect(x,y,w,h,c){
  ctx.fillStyle=c;
  ctx.fillRect(x,y,w,h);
}

function drawParquet(){
  rect(0,0,BASE_W,BASE_H,colors.parquet);
  ctx.strokeStyle=colors.parquetDark;
  for(let i=-BASE_H;i<BASE_W;i+=8){
    ctx.beginPath();
    ctx.moveTo(i,0);
    ctx.lineTo(i+BASE_H,BASE_H);
    ctx.stroke();
  }
}

function drawWalls(){
  rect(0,0,BASE_W,16,colors.wall);
  rect(0,0,16,BASE_H,colors.wall);
  rect(BASE_W-16,0,16,BASE_H,colors.wall);
  rect(0,0,BASE_W,6,colors.wallTop);
}

function drawCarpet(){
  rect(80,60,80,48,colors.carpet);
  ctx.strokeStyle="#FFFFFF";
  ctx.strokeRect(80,60,80,48);
  rect(90,70,6,6,colors.carpetDot);
  rect(120,85,6,6,colors.carpetDot);
}

function drawBed(){
  rect(24,48,32,32,colors.bed);
  rect(32,52,16,12,colors.pillow);
}

function drawDesk(){
  rect(160,40,32,16,colors.desk);
  rect(170,34,12,10,colors.pc);
}

function drawStairs(){
  rect(160,96,32,32,colors.stair);
  rect(160,96,32,6,colors.stairDark);
  rect(160,108,32,6,colors.stairDark);
}

const player = {x:110,y:90};
const npc = {x:180,y:110};

function drawPlayer(){
  rect(player.x,player.y,12,12,"#D03030");
  rect(player.x+3,player.y+3,6,6,"#FFFFFF");
}

function drawNPC(){
  rect(npc.x,npc.y,12,12,"#30B050");
}

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawParquet();
  drawWalls();
  drawCarpet();
  drawBed();
  drawDesk();
  drawStairs();
  drawNPC();
  drawPlayer();
  requestAnimationFrame(loop);
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowUp") player.y-=4;
  if(e.key==="ArrowDown") player.y+=4;
  if(e.key==="ArrowLeft") player.x-=4;
  if(e.key==="ArrowRight") player.x+=4;
});

loop();
</script>
</body>
</html>
